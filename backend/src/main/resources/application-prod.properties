# Perfil de produccion. Los secretos van en Azure App Service > Configuration > Application settings.
# Spring Boot acepta las mismas claves como variables de entorno (ej. SPRING_DATASOURCE_URL).

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
logging.level.root=INFO
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

server.port=${PORT:8080}

# Origenes extra del frontend (separados por coma). localhost:4200 ya viene por defecto.
# cors.allowed-origins=https://tu-frontend.azurestaticapps.net
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
spring.servlet.multipart.resolve-lazily=true
