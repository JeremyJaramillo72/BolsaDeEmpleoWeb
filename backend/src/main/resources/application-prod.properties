# Perfil de produccion. Los secretos van en Azure App Service > Configuration > Application settings.
# Spring Boot acepta las mismas claves como variables de entorno (ej. SPRING_DATASOURCE_URL).

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
logging.level.root=INFO
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

server.port=${PORT:8080}

# Origenes del frontend en produccion (separados por coma). Sobrescribir en Azure App Settings.
# cors.allowed-origins=https://tu-frontend.azurestaticapps.net
