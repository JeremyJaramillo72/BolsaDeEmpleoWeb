<div class="notification-wrapper">
  <button class="bell-btn" (click)="toggleDropdown($event)">
    <span class="material-icons">notifications_active</span>
    <span class="badge" *ngIf="cantidadActivasSinLeer > 0">
      {{ cantidadActivasSinLeer }}
    </span>
  </button>

  <div class="dropdown-menu" *ngIf="dropdownOpen">
    <div class="dropdown-header">
      <h4>Notificaciones Activas (últimos 5 días)</h4>
      <button class="btn-mark-all" (click)="marcarTodas()" *ngIf="notificacionesActivas.length > 0">Marcar todas leídas</button>
    </div>

    <div class="dropdown-body">
      <div *ngIf="isLoading" class="loading-notif">
        <span class="material-icons spinner-small">sync</span>
        <span>Cargando notificaciones...</span>
      </div>

      <div *ngIf="!isLoading && notificacionesActivas.length === 0" class="empty-state">
        ✨ Todas tus notificaciones están resueltas
      </div>

      <div *ngIf="!isLoading && notificacionesActivas.length > 0">
        <div *ngFor="let item of notificacionesActivas"
             class="notif-item unread"
             (click)="clickNotificacion(item)">
          <div class="notif-icon">
            <span class="material-icons">{{ item.icono || 'notifications' }}</span>
          </div>
          <div class="notif-content">
            <span class="notif-title">{{ item.titulo }}</span>
            <p class="notif-message">{{ item.mensaje }}</p>
          </div>
          <span class="notif-time">{{ tiempoTranscurrido(item.fechaCreacion) }}</span>
          <div class="unread-dot"></div>
        </div>
      </div>
    </div>

    <div class="dropdown-footer">
      <a href="#" (click)="$event.preventDefault(); navigate('/menu-principal/notificaciones')" class="ver-todas">
        Ver historial completo →
      </a>
    </div>
  </div>
</div>
