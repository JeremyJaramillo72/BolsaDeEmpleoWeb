<div class="custom-card form-card mt-4">
  <div class="card-header" style="justify-content: space-between; margin-bottom: 16px;">
    <div style="display: flex; gap: 16px; align-items: center;">
      <div class="icon-box"><span class="material-icons">language</span></div>
      <div>
        <h1>Idiomas</h1>
        <p>Lenguajes que dominas y certificaciones</p>
      </div>
    </div>
    <button (click)="abrirModal()" class="btn-add-section" type="button">
      <span class="material-icons">add</span> Añadir Idioma
    </button>
  </div>

  <div class="registered-items" *ngIf="idiomas && idiomas.length > 0">
    <div *ngFor="let item of idiomas; let i = index" class="document-item-card">
      <div class="card-left-icon status-valid"><span class="material-icons">translate</span></div>
      <div class="card-content">
        <h3>{{ item.nombre_idioma }}</h3>
        <p>Nivel de Dominio: {{ item.nivel }}</p>
      </div>
      <div class="card-actions">
        <button class="btn-ver-pdf" (click)="onVerPdf.emit(item.nombreArchivo)" *ngIf="item.nombreArchivo">
          <span class="material-icons">description</span> Ver PDF
        </button>
        <button class="btn-eliminar" (click)="editar(item)" title="Editar">
          <span class="material-icons" style="color: #3b82f6;">edit</span>
        </button>
        <button class="btn-eliminar" (click)="onEliminar.emit({index: i, id: item.id_usuario_idioma})" title="Eliminar">
          <span class="material-icons">delete</span>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!idiomas || idiomas.length === 0" style="text-align: center; padding: 20px; color: #64748b;">
    <span class="material-icons" style="font-size: 40px; opacity: 0.5;">g_translate</span>
    <p>No tienes idiomas registrados.</p>
  </div>
</div>

<div class="modal-overlay" *ngIf="modalIdioma">
  <div class="modal-content">
    <div class="modal-header">
      <h2>{{ idEdicionIdioma ? 'Editar' : 'Añadir' }} Idioma</h2>
      <button class="btn-close" (click)="cerrarModal()"><span class="material-icons">close</span></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Seleccionar Idioma</label>
          <select [(ngModel)]="nuevoIdioma.id_idioma" name="id_idioma">
            <option [ngValue]="null" disabled>Seleccionar...</option>
            <option *ngFor="let idm of idiomasDisponibles" [value]="idm.idIdioma">{{ idm.nombreIdioma }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nivel de Dominio</label>
          <select [(ngModel)]="nuevoIdioma.nivel" name="nivel">
            <option [ngValue]="null" disabled>Seleccionar...</option>
            <option *ngFor="let n of niveles" [value]="n">{{ n }}</option>
          </select>
        </div>
      </div>
      <div class="actions-row mt-4">
        <button type="button" class="btn-attach" (click)="fileInputIdm.click()">
          <span class="material-icons">attach_file</span> {{ nuevoIdioma.nombreArchivo || 'Adjuntar Certificado (PDF)' }}
        </button>
        <input #fileInputIdm type="file" (change)="onFileSelected($event)" hidden accept=".pdf">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="cerrarModal()">Cancelar</button>
      <button class="btn-save-item" (click)="prepararGuardado()">
        <span class="material-icons">cloud_upload</span> {{ idEdicionIdioma ? 'Actualizar' : 'Guardar' }} Idioma
      </button>
    </div>
  </div>
</div>
