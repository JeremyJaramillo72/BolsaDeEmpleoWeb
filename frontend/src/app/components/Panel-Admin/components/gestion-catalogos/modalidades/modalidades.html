<div class="alert alert-success" *ngIf="mensajeExito">
  <span class="material-icons">check_circle</span> {{ mensajeExito }}
</div>
<div class="alert alert-error" *ngIf="mensajeError">
  <span class="material-icons">error_outline</span> {{ mensajeError }}
</div>

<div class="section-card">
  <div class="section-header">
    <div class="icon-box-title text-teal"><span class="material-icons">devices</span></div>
    <h3>{{ idEditando ? 'Editando Modalidad' : 'Modalidades de Trabajo' }}</h3>
  </div>

  <div class="form-inline">
    <div class="form-group flex-1">
      <label>{{ idEditando ? 'Modificar Nombre' : 'Nueva Modalidad' }}</label>
      <div class="input-wrapper">
        <span class="material-icons text-muted">edit</span>
        <input type="text" [(ngModel)]="nuevaModalidad.nombre" class="form-control" placeholder="Ej: Remoto, Presencial..." (keyup.enter)="guardarModalidad()">
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn-primary" *ngIf="!idEditando" (click)="guardarModalidad()">
        <span class="material-icons">add</span> Agregar
      </button>

      <button class="btn-primary" *ngIf="idEditando" (click)="guardarModalidad()" style="background-color: #10b981;">
        <span class="material-icons">save</span> Actualizar
      </button>

      <button class="btn-secondary" *ngIf="idEditando" (click)="cancelarEdicion()" style="background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 0.7rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer;">
        Cancelar
      </button>
    </div>
  </div>

  <div class="items-list">
    <div class="item-card" *ngFor="let mod of modalidades">
      <div class="item-info">
        <span class="material-icons item-icon text-teal">computer</span>
        <span class="item-name">{{ mod.nombreModalidad }}</span>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn-action-icon edit" (click)="editarModalidad(mod)" title="Editar" style="color: #3b82f6;">
          <span class="material-icons">edit</span>
        </button>
        <button class="btn-action-icon delete" (click)="eliminarModalidad(mod.idModalidad!)" title="Eliminar">
          <span class="material-icons">delete_outline</span>
        </button>
      </div>

    </div>
    <div class="empty-state" *ngIf="modalidades.length === 0">
      <span class="material-icons">desktop_access_disabled</span><p>No hay modalidades registradas.</p>
    </div>
  </div>
</div>
