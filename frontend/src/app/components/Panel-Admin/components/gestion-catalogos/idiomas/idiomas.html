<div class="alert alert-success" *ngIf="mensajeExito">
  <span class="material-icons">check_circle</span> {{ mensajeExito }}
</div>
<div class="alert alert-error" *ngIf="mensajeError">
  <span class="material-icons">error_outline</span> {{ mensajeError }}
</div>

<div class="section-card">
  <div class="section-header">
    <div class="icon-box-title text-green"><span class="material-icons">language</span></div>
    <h3>{{ idEditando ? 'Editando Idioma' : 'Idiomas del Sistema' }}</h3>
  </div>

  <div class="form-inline">
    <div class="form-group flex-1">
      <label>{{ idEditando ? 'Modificar Nombre' : 'Nuevo Idioma' }}</label>
      <div class="input-wrapper">
        <span class="material-icons text-muted">edit</span>
        <input type="text" [(ngModel)]="nuevoIdioma.nombre" class="form-control" placeholder="Ej: Francés" (keyup.enter)="guardarIdioma()">
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn-primary" *ngIf="!idEditando" (click)="guardarIdioma()">
        <span class="material-icons">add</span> Agregar
      </button>

      <button class="btn-primary" *ngIf="idEditando" (click)="guardarIdioma()" style="background-color: #10b981;">
        <span class="material-icons">save</span> Actualizar
      </button>

      <button class="btn-secondary" *ngIf="idEditando" (click)="cancelarEdicion()" style="background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 0.7rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer;">
        Cancelar
      </button>
    </div>
  </div>

  <div class="items-list">
    <div class="item-card" *ngFor="let idm of idiomas">
      <div class="item-info">
        <span class="material-icons item-icon text-green">translate</span>
        <span class="item-name">{{ idm.nombreIdioma }}</span>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn-action-icon edit" (click)="editarIdioma(idm)" title="Editar" style="color: #3b82f6;">
          <span class="material-icons">edit</span>
        </button>
        <button class="btn-action-icon delete" (click)="eliminarIdioma(idm.idIdioma!)" title="Eliminar">
          <span class="material-icons">delete_outline</span>
        </button>
      </div>

    </div>
    <div class="empty-state" *ngIf="idiomas.length === 0">
      <span class="material-icons">speaker_notes_off</span><p>No hay idiomas registrados.</p>
    </div>
  </div>
</div>
