<div class="alert alert-success" *ngIf="mensajeExito">
  <span class="material-icons">check_circle</span> {{ mensajeExito }}
</div>
<div class="alert alert-error" *ngIf="mensajeError">
  <span class="material-icons">error_outline</span> {{ mensajeError }}
</div>

<div class="section-card">
  <div class="section-header">
    <div class="icon-box-title text-orange"><span class="material-icons">schedule</span></div>
    <h3>{{ idEditando ? 'Editando Jornada' : 'Jornadas Laborales' }}</h3>
  </div>

  <div class="form-inline">
    <div class="form-group flex-1">
      <label>{{ idEditando ? 'Modificar Nombre' : 'Nueva Jornada' }}</label>
      <div class="input-wrapper">
        <span class="material-icons text-muted">edit</span>
        <input type="text" [(ngModel)]="nuevaJornada.nombre" class="form-control" placeholder="Ej: Medio Tiempo" (keyup.enter)="guardarJornada()">
      </div>
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn-primary" *ngIf="!idEditando" (click)="guardarJornada()">
        <span class="material-icons">add</span> Agregar
      </button>

      <button class="btn-primary" *ngIf="idEditando" (click)="guardarJornada()" style="background-color: #10b981;">
        <span class="material-icons">save</span> Actualizar
      </button>

      <button class="btn-secondary" *ngIf="idEditando" (click)="cancelarEdicion()" style="background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 0.7rem 1.5rem; border-radius: 10px; font-weight: 600; cursor: pointer;">
        Cancelar
      </button>
    </div>
  </div>

  <div class="items-list">
    <div class="item-card" *ngFor="let jor of jornadas">
      <div class="item-info">
        <span class="material-icons item-icon text-orange">more_time</span>
        <span class="item-name">{{ jor.nombreJornada }}</span>
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn-action-icon edit" (click)="editarJornada(jor)" title="Editar" style="color: #3b82f6;">
          <span class="material-icons">edit</span>
        </button>
        <button class="btn-action-icon delete" (click)="eliminarJornada(jor.idJornada!)" title="Eliminar">
          <span class="material-icons">delete_outline</span>
        </button>
      </div>

    </div>
    <div class="empty-state" *ngIf="jornadas.length === 0">
      <span class="material-icons">timer_off</span><p>No hay jornadas registradas.</p>
    </div>
  </div>
</div>
