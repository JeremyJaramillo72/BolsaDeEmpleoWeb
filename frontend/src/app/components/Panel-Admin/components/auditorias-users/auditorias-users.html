<div class="page-container">
  <div class="page-header">
    <h1>
      <span class="header-icon">👥</span>
      Auditorías de Usuarios
    </h1>
    <p class="page-description">Gestione los usuarios y sesiones del sistema</p>
  </div>

  <div class="alert alert-error" *ngIf="mensajeError">
    <span class="material-icons">error</span>
    {{ mensajeError }}
  </div>

  <div class="main-tabs-container">
    <button class="main-tab-btn" [class.active]="tabPrincipal === 'usuarios'" (click)="tabPrincipal = 'usuarios'">
      <span class="material-icons">people</span> Usuarios
    </button>
    <button class="main-tab-btn" [class.active]="tabPrincipal === 'sesiones'" (click)="tabPrincipal = 'sesiones'">
      <span class="material-icons">login</span> Sesiones
    </button>
    <button class="main-tab-btn" [class.active]="tabPrincipal === 'ofertas'" (click)="tabPrincipal = 'ofertas'">
      <span class="material-icons">work_history</span> Histórico Ofertas
    </button>
  </div>

  <app-usuarios *ngIf="tabPrincipal === 'usuarios'"></app-usuarios>
  <app-sesiones *ngIf="tabPrincipal === 'sesiones'"></app-sesiones>
  <app-ofertas *ngIf="tabPrincipal === 'ofertas'"></app-ofertas>

</div>
